<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>KantinPintar - Kasir Mini</title>

    <!--BAGIAAN CSS: Mengatur tata letak dan keindahan halaman web -->
    <style>
        /* Mengatur tampilan font dasar dan warna latar belakang halaman */
        body {
            font-family: sans-serif;
            background-color: #f4f6f9;
            padding: 20px;
            margin: 0;
        }
        /* Mengatur lebar maksimal halaman agar konten berada di tengah layar */
        .container {
            max-widht: 1100px;
            margin: 20px;
        }

        /* Mengatur kotak judul atas (Header) */
        header {
            text-align: center;
            background-color: #ffffff;
            padding: 15px;
            border-radius: 10%;
            box-shadow: 0 4px 6px;
        }

        /* Mengatur tata letak utama menjadi 2 kolom menggunakan CSS Grid */
        /* kolom kiri berukuran 350px (form), kolom kanan menghabiskan sisa layar (Etalase) */
        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        /* Mengatur kotak panel di sebelah kiri */
        .form-panel {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0 0,0,0.05);
            height: fit-content;
        }

        /* Memberikan jarak antar-kelompok input */
        .form-group {
            margin-bottom: 15px;
        }

        /* Mengatur teks label petunjuk di atas kotak input */
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        /*Mengatur ukuran kotak input teks, angka, dan pilihan */
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #cccccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        /* Mengatur tampilan tombol simpan menjadi berwarna hijau */
        .btn-simpan {
            width: 100%;
            padding: 10%;
            background-color: #2ecc71;
            color: #ffffff;
            border: none;
            border-radius: 5%;
            font-weight: bold;
            cursor: pointer;
        }

        /*mengatur area etalase di sebelah kanan agar kartu produk otomatis bebaris rapi */
        .etalase-panel {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        /* Mengatur kotak pembungkus untuk satu kartu produk makanan */
        .card-menu img {
            background-color: #ffffff;
            border-radius: 10px;
            overflow: hidden;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0 0,0,0.05);
        }

        /*mengatur ukuran gambar produk di dalam kartu */
        .card-menu img {
            width: 100%;
            height: 140px;
            object-fit: cover;
        }

        /*memberikan jarak bagian dalam untuk teks info produk */
        .card-info {
            padding: 15px;
        }

        /*mengatur teks harga menjadi berwarna orange */
        .harga {
            color: #e67e22;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <!--Bagian Kepala Halaman Web-->
        <header>
            <h1>KantinPintar</h1>
            <p>Tahap 1: Membuat Struktur Halaman Utama</p>
        </header>
        <!--- Area Tata Letak Utama-->
        <div class="main-layout">
            <!--PANEL SEBELAH KIRI: FORM INPUT DATA BARU-->
            <div class="form-panel">
                <h3>Tambah Menu Baru</h3>
                <div class="form-group">
                    <label>Nama Makanan</label>
                    <input type="text" placeholder="contoh=bakso">
                </div>
                <div class="form-group">
                    <label>Harga (Rp)</label>
                    <input type="number" placeholder="contoh=10000">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select>
                        <option value="Tersedia">Tersedia</option>
                        <option value="Habis">Habis</option>
                    </select>
                </div>
                <button class="btn-simpan">Simpan Ke Menu</button>
            </div>
            <!--PANEL SEBELAH KANAN: ETALASE PRODUK-->
            <div class="etalase panel">

            <!-- Contoh elemen kartu menu statis-->
             <div class="card-menu">
                <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400" alt="Makanan">
                <div class="card-info">
                    <h3>Nasi Pecel Madiun</h3>
                    <div class="Harga">Rp 12.000</div>
                </div>
            </div>
        </div>

    </div>
        </div> 
    </div>
</body>

    </style>


</head>
</html>
